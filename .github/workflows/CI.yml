name: Test CI Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  git_leaks_scan:
    name: GitLeaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GitLeaks
        run: |
          sudo apt-get install -y gitleaks

      - name: Run GitLeaks
        run: |
          gitleaks detect --source healet-html/ --report-format sarif --report-path gitleaks.sarif

      - name: Upload Gitleaks SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif 

  dockerfile-security-check:
    needs: git_leaks_scan
    name: Dockerfile Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Dockerfile for secure USER usage
        run: |
          chmod +x healet-html/script.sh
          ./healet-html/script.sh

  install_docker_buildx:
    needs: dockerfile-security-check
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

  docker_actions:
    needs: install_docker_buildx
    runs-on: ubuntu-latest
    steps:
    - 
      name: Checkout code
      uses: actions/checkout@v4
    -
      name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - 
      name: Set short SHA
      id: vars
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
    - 
      name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./healet-html
        file: ./healet-html/Dockerfile
        push: true
        tags: colanta06/jewellryshop-website:${{ steps.vars.outputs.SHORT_SHA }}
 